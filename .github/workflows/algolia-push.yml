name: Push Algolia Search Data
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docsearch-scraper
        run: pip install docsearch-scraper

      - name: Run scraper and push to Algolia
        run: |
          docsearch-scraper \
            --config ./crawlerConfig.json \
            --api-key "${{ secrets.ALGOLIA_WRITE_API_KEY }}" \
            --app-id "${{ secrets.ALGOLIA_APP_ID }}"
        env:
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_WRITE_API_KEY: ${{ secrets.ALGOLIA_WRITE_API_KEY }}