name: Deploy VitePress site to Pages

on:
  push:
    tags:
      - '*'
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          ref: 'master'

      - name: Install yarn
        run: corepack enable

      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Build Site
        run: npm run docs:build

      # 将文档产物提交到gh-pages分支
      - name: Deploy for Github 🚀
        uses: JamesIves/github-pages-deploy-action@v4.4.1
        with:
          branch: gh-pages
          folder: docs/.vitepress/dist
          single-commit: true
          clean: true

      # ==============================================
      # 👇 下面是修复后的 Algolia 步骤，解决安装错误
      # ==============================================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" # 用更兼容的 3.10 版本

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install docsearch-scraper (from GitHub)
        run: pip install git+https://github.com/algolia/docsearch-scraper.git

      - name: Update Algolia Search Index
        run: |
          docsearch-scraper \
            --config ./crawlerConfig.json \
            --api-key "${{ secrets.ALGOLIA_WRITE_API_KEY }}" \
            --app-id "${{ secrets.ALGOLIA_APP_ID }}"
        env:
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_WRITE_API_KEY: ${{ secrets.ALGOLIA_WRITE_API_KEY }}